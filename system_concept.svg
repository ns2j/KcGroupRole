<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
    <linearGradient id="springGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#84cc16" />
      <stop offset="100%" stop-color="#4d7c0f" />
    </linearGradient>
    <linearGradient id="nextGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="flutterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="kcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrowSolid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bg)" />
  
  <!-- Title -->
  <text x="500" y="55" font-family="sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">System Architecture Diagram</text>

  <!-- Connections -->
  
  <!-- Next.js to BFF -->
  <path d="M 230 140 C 350 140, 350 250, 420 250" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrow)" />
  <text x="250" y="165" font-family="sans-serif" font-size="12" font-weight="bold" fill="#cbd5e1">1. HTTP-Only Cookie</text>

  <!-- Flutter to BFF -->
  <path d="M 230 360 C 350 360, 350 250, 420 250" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrow)" />
  <text x="250" y="345" font-family="sans-serif" font-size="12" font-weight="bold" fill="#cbd5e1">1. JWT Bearer Token</text>

  <!-- BFF to Keycloak -->
  <path d="M 520 330 L 520 420" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <text x="535" y="380" font-family="sans-serif" font-size="12" fill="#94a3b8">Auth Code Flow / OIDC Refresh</text>

  <!-- BFF to Backend -->
  <path d="M 620 250 L 730 250" fill="none" stroke="#cbd5e1" stroke-width="4" marker-end="url(#arrowSolid)" />
  <text x="640" y="240" font-family="sans-serif" font-size="12" font-weight="bold" fill="#f8fafc">2. Proxied API</text>
  <text x="640" y="265" font-family="sans-serif" font-size="10" fill="#94a3b8">Decorated with Token</text>

  <!-- Keycloak to Backend -->
  <path d="M 620 460 C 830 460, 830 330, 830 330" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <text x="750" y="455" font-family="sans-serif" font-size="11" fill="#94a3b8">JWKS Key Validation</text>


  <!-- Clients (Left) -->
  
  <g transform="translate(30, 100)" filter="url(#shadow)">
    <rect width="200" height="80" rx="12" fill="url(#nextGrad)" stroke="#64748b" stroke-width="1.5" />
    <text x="100" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Next.js Web App</text>
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">React Server/Client App</text>
  </g>

  <g transform="translate(30, 320)" filter="url(#shadow)">
    <rect width="200" height="80" rx="12" fill="url(#flutterGrad)" stroke="#0ea5e9" stroke-width="1.5" />
    <text x="100" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Flutter Mobile App</text>
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#e0f2fe" text-anchor="middle">iOS / Android</text>
  </g>

  <!-- Middleware (Center) -->
  
  <g transform="translate(420, 170)" filter="url(#shadow)">
    <rect width="200" height="160" rx="16" fill="url(#nodeGrad)" stroke="#4ade80" stroke-width="2" />
    <text x="100" y="35" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">Node.js BFF</text>
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#ecfdf5" text-anchor="middle">Express API Gateway</text>
    
    <rect x="20" y="75" width="160" height="24" rx="4" fill="#064e3b" opacity="0.8" />
    <text x="100" y="91" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">AST Policy Engine</text>
    
    <rect x="20" y="110" width="160" height="24" rx="4" fill="#064e3b" opacity="0.8" />
    <text x="100" y="126" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">Security &amp; Auto Refresh</text>
  </g>

  <!-- Identity Provider (Bottom Center) -->
  
  <g transform="translate(420, 420)" filter="url(#shadow)">
    <rect width="200" height="80" rx="12" fill="url(#kcGrad)" stroke="#f59e0b" stroke-width="1.5" />
    <text x="100" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Keycloak</text>
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#fef3c7" text-anchor="middle">Identity Provider (OIDC)</text>
  </g>

  <!-- Resource Server (Right) -->
  
  <g transform="translate(730, 210)" filter="url(#shadow)">
    <rect width="200" height="120" rx="16" fill="url(#springGrad)" stroke="#84cc16" stroke-width="2" />
    <text x="100" y="35" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">Spring Boot API</text>
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#f7fee7" text-anchor="middle">Resource Server</text>
    
    <rect x="20" y="75" width="160" height="24" rx="4" fill="#14532d" opacity="0.8" />
    <text x="100" y="91" font-family="sans-serif" font-size="11" font-weight="bold" fill="#a3e635" text-anchor="middle">@PreAuthorize RBAC</text>
  </g>
</svg>
